services:
  mongodb:
    image: mongo:7
    container_name: copa-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: copa
      MONGO_INITDB_ROOT_PASSWORD: copa_dev_password
      MONGO_INITDB_DATABASE: copa_album
    volumes:
      - copa_mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--username", "copa", "--password", "copa_dev_password", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  copa_mongodb_data:
